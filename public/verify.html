<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue Rocket - Access Code</title>
  <style>
    body { background-color: #0d1b2a; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: #1b263b; padding: 30px; border-radius: 15px; text-align: center; width: 300px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    input { width: 90%; padding: 12px; margin: 15px 0; border-radius: 5px; border: none; text-align: center; font-size: 20px; letter-spacing: 5px; background: #e0e1dd; color: #0d1b2a; }
    button { width: 96%; padding: 12px; border: none; border-radius: 5px; background-color: #38b000; color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: background-color 0.2s; }
    button:hover { background-color: #2dc600; }
    .rocket-code { font-size: 15px; font-weight: bold; color: #00b4d8; margin: 15px 0; letter-spacing: 0.5px; line-height: 1.4; }
    .email-display { font-size: 13px; color: #a4c3b2; opacity: 0.8; word-break: break-all; font-style: italic; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Launch Verification 🔑</h2>
    <p style="margin-bottom: 5px;">To verify your rocket engine and enter the chat, enter the 6-digit access code sent to your inbox:</p>
    
    
    <div class="email-display" id="targetEmail">Checking delivery path...</div>

    <!-- Instructions instructing user to review their MailerSend transmission node -->
    <div class="rocket-code">📬 Check your email for your secure verification key code string!</div>

    <form id="verifyForm">
      <input type="text" id="code" maxlength="6" placeholder="000000" pattern="[0-9]*" inputmode="numeric" required autocomplete="one-time-code">
      <button type="submit">Verify & Launch</button>
    </form>
  </div>

  <script>
    // Enforce operational context checks before rendering forms
    const email = localStorage.getItem('pendingEmail');
    if (!email) {
      alert("Verification context missing. Returning to launchpad portal gateway.");
      window.location.href = '/';
    } else {
      document.getElementById('targetEmail').innerText = email;
    }

    // Block non-numeric characters from polluting layout values during typing
    document.getElementById('code').addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/[^0-9]/g, '');
    });

    document.getElementById('verifyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = document.getElementById('code').value.trim();

      if (code.length !== 6) {
        return alert("Access code verification key tokens must contain exactly 6 digits.");
      }

      try {
        const res = await fetch('/api/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, code })
        });

        const data = await res.json();
        if (res.ok && data.success) {
          // Clear onboarding setup artifacts and save production identity sessions
          localStorage.removeItem('pendingEmail');
          localStorage.setItem('token', data.token);
          localStorage.setItem('username', data.username);
          window.location.href = '/chat.html';
        } else {
          alert(data.message || 'Incorrect Launch Code Verification Key. Try again!');
        }
      } catch (err) {
        alert('Verification data stream dropped. Check network infrastructure status.');
      }
    });
  </script>
</body>
</html>
