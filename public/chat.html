<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue Rocket - Chat Matrix</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; background-color: #0b132b; color: #fff; display: flex; height: 100vh; overflow: hidden; }
    
    /* SIDEBAR LAYOUT */
    .sidebar { width: 280px; background: #1c2541; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
    .user-profile { margin-bottom: 20px; }
    .user-profile span { font-weight: bold; font-size: 18px; display: block; margin-bottom: 8px; color: #e0e1dd; }
    .logout-btn { background: #ef233c; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 13px; }
    
    /* BUTTON INTERFACES FROM IMAGE */
    .btn-container { display: flex; gap: 10px; margin-bottom: 25px; }
    .add-friend-btn { flex: 1; background: #00b4d8; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 4px; }
    .new-group-btn { flex: 1; background: #7209b7; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 4px; }
    
    /* SECTION HEADERS FROM IMAGE */
    .section-header { font-size: 15px; font-weight: bold; color: #00b4d8; margin: 18px 0 8px 0; display: flex; align-items: center; gap: 6px; }
    .feed-container { display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; }
    
    .channel-item { padding: 10px; border-radius: 6px; background: #3a506b; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 14px; transition: 0.2s; border-left: 4px solid transparent; }
    .channel-item:hover { background: #5c715e; transform: translateX(2px); }
    .channel-item.active { background: #0077b6; border-left-color: #00b4d8; }
    .presence-dot { width: 8px; height: 8px; border-radius: 50%; background: #6c757d; }
    .presence-dot.online { background: #38b000; box-shadow: 0 0 6px #38b000; }
    
    /* ACTION BOXES FOR REQUESTS */
    .req-card { padding: 10px; background: #222e50; border-radius: 6px; font-size: 13px; display: flex; flex-direction: column; gap: 6px; }
    .req-actions { display: flex; gap: 4px; }
    .req-actions button { flex: 1; border: none; padding: 6px; font-size: 11px; font-weight: bold; border-radius: 4px; cursor: pointer; color: white; }

    /* CHAT WORKSPACE DESIGN */
    .chat-area { flex: 1; display: flex; flex-direction: column; background: #0b132b; }
    .chat-header { padding: 18px; background: #1c2541; border-bottom: 1px solid #3a506b; font-size: 16px; font-weight: bold; display: flex; justify-content: space-between; }
    .typing-box { font-size: 13px; color: #38b000; font-style: italic; }
    .messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    
    .message { max-width: 60%; padding: 10px 14px; border-radius: 8px; word-wrap: break-all; font-size: 15px; line-height: 1.4; display: flex; flex-direction: column; }
    .message .sender-label { font-size: 11px; opacity: 0.6; margin-bottom: 2px; font-weight: bold; }
    .message.sent { background: #0077b6; align-self: flex-end; }
    .message.received { background: #3a506b; align-self: flex-start; }
    .message img { max-width: 100%; border-radius: 4px; margin-top: 5px; }

    /* FOOTER INPUT CONTROLS */
    .input-bar { padding: 15px; background: #1c2541; display: flex; gap: 10px; align-items: center; border-top: 1px solid #3a506b; }
    .media-btn { background: #e0e1dd; color: #0b132b; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-size: 16px; }
    input[type="text"] { flex: 1; padding: 11px; border: none; border-radius: 5px; background: #e0e1dd; color: #0b132b; font-size: 15px; outline: none; }
    .send-btn { background: #00b4d8; color: white; border: none; padding: 11px 22px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    .wipe-btn { background: #ef233c; color: white; border: none; padding: 11px 18px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    
    .camera-box { width: 240px; background: #000; padding: 8px; border-radius: 6px; border: 2px solid #00b4d8; position: absolute; bottom: 80px; right: 20px; display: flex; flex-direction: column; gap: 4px; }
    .camera-box video { width: 100%; transform: scaleX(-1); border-radius: 4px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- SIDEBAR SYSTEM FROM YOUR SCREENSHOT -->
  <div class="sidebar">
    <div class="user-profile">
      <span id="myUsernameDisplay">🚀 User</span>
      <button class="logout-btn" onclick="logout()">Log Out</button>
    </div>

    <!-- ACTION CONTROLS MATRIX -->
    <div class="btn-container">
      <button class="add-friend-btn" onclick="promptFriendAdd()">➕ Add Friend</button>
      <button class="new-group-btn" onclick="promptGroupCreate()">⚡ New Group</button>
    </div>

    <!-- DYNAMIC LISTINGS FEEDS -->
    <div class="section-header">Pending Requests ✉️</div>
    <div class="feed-container" id="friendRequestsFeed"></div>

    <div class="section-header">Group Invites 👥</div>
    <div class="feed-container" id="groupInvitesFeed"></div>

    <div class="section-header">Channels & Friends 🚀</div>
    <div class="feed-container" id="activeChannelsFeed"></div>
  </div>

  <!-- MAIN MESSAGE GRAPH VIEWPORT -->
  <div class="chat-area">
    <div class="chat-header">
      <div id="chatHeaderTitle">No active chat</div>
      <div class="typing-box" id="typingStatusSlot"></div>
    </div>
    
    <div class="messages-container" id="messagesContainer"></div>

    <!-- CAMERA OVERLAY MODULE -->
    <div class="camera-box hidden" id="cameraViewportPanel">
      <video id="webcamStream" autoplay playsinline></video>
      <div style="display: flex; gap: 4px;">
        <button onclick="captureCameraSnapshot()" style="background:#38b000;flex:1;border:none;color:white;padding:4px;font-weight:bold;cursor:pointer;">SNAP</button>
        <button onclick="closeCameraViewport()" style="background:#ef233c;flex:1;border:none;color:white;padding:4px;font-weight:bold;cursor:pointer;">CLOSE</button>
      </div>
    </div>

    <!-- INPUT DOCK CONTROLS -->
    <div class="input-bar">
      <button class="media-btn" onclick="openCameraViewport()">📷</button>
      <button class="media-btn" onclick="document.getElementById('hiddenFileInput').click()">📎</button>
      <input type="file" id="hiddenFileInput" class="hidden" onchange="stageFileAttachment(event)">
      
      <input type="text" id="messageInput" placeholder="Type a message safely..." onkeydown="handleKeyPress(event)" oninput="emitTypingState()">
      
      <button class="send-btn" onclick="executeMessageDispatch()">Send</button>
      <button class="wipe-btn hidden" onclick="clearStagedAttachmentFile()" id="wipeBtn">Wipe</button>
    </div>
  </div>

  <script>
    const socket = io();
    const me = localStorage.getItem('username');
    
    let peer = null; 
    let isGroup = false;
    let onlineUsersList = [];
    
    let stagedFileBuffer = null;
    let stagedFileType = null;
    let stagedFileName = null;
    let cameraVideoStreamObject = null;
    let typingDebounceTimer = null;

    if (!me) {
      window.location.href = '/';
    } else {
      document.getElementById('myUsernameDisplay').innerText = `🚀 ${me}`;
    }

    function enableExternalPushNotifications() {
      if (!me) return;
      const cleanTopic = `bluerocket_chat_${me.replace(/[^a-zA-Z0-9]/g, '_')}`;
      console.log(`Push notifications routed via: https://ntfy.sh{cleanTopic}`);
    }

    window.addEventListener('DOMContentLoaded', () => {
      enableExternalPushNotifications();
      socket.emit('join', me);
      refreshDashboardDataSync();
      socket.emit('request_online_sync');
    });

    async function refreshDashboardDataSync() {
      try {
        const res = await fetch(`/api/friends-data/${me}`);
        if (!res.ok) return;
        const data = await res.json();

        // RENDER ACTIVE CONTEXT MATRIX FEEDS
        const channelsFeed = document.getElementById('activeChannelsFeed');
        channelsFeed.innerHTML = '';
        
        if (data.friends) {
          data.friends.forEach(fName => {
            const isOnline = onlineUsersList.includes(fName.toLowerCase());
            const div = document.createElement('div');
            div.className = `channel-item ${peer === fName && !isGroup ? 'active' : ''}`;
            div.innerHTML = `<span>👤 ${fName}</span> <div class="presence-dot ${isOnline ? 'online' : ''}"></div>`;
            div.onclick = () => switchActiveChatThread(fName, false);
            channelsFeed.appendChild(div);
          });
        }

        // RENDER INCOMING FRIEND INVITATIONS
        const friendReqFeed = document.getElementById('friendRequestsFeed');
        friendReqFeed.innerHTML = '';
        if (data.requests && data.requests.length > 0) {
          data.requests.forEach(reqName => {
            const div = document.createElement('div');
            div.className = 'req-card';
            div.innerHTML = `
              <span><b>@${reqName}</b> wants to add you</span>
              <div class="req-actions">
                <button style="background:#38b000;" onclick="processFriendRequestAction('${reqName}', 'accept')">Accept</button>
                <button style="background:#ef233c;" onclick="processFriendRequestAction('${reqName}', 'decline')">Drop</button>
              </div>`;
            friendReqFeed.appendChild(div);
          });
        }

        // RENDER INCOMING GROUP INVITATIONS
        const groupReqFeed = document.getElementById('groupInvitesFeed');
        groupReqFeed.innerHTML = '';
        if (data.groupRequests && data.groupRequests.length > 0) {
          data.groupRequests.forEach(gReq => {
            const div = document.createElement('div');
            div.className = 'req-card';
            div.innerHTML = `
              <span>Room <b>${gReq.groupName}</b> invitation</span>
              <div class="req-actions">
                <button style="background:#38b000;" onclick="processGroupInviteAction('${gReq.groupId}', 'accept')">Join</button>
                <button style="background:#ef233c;" onclick="processGroupInviteAction('${gReq.groupId}', 'skip')">Skip</button>
              </div>`;
            groupReqFeed.appendChild(div);
          });
        }
      } catch (err) { console.error("Sync error:", err); }
    }

    function switchActiveChatThread(target, groupState) {
      peer = target;
      isGroup = groupState;
      document.getElementById('chatHeaderTitle').innerText = isGroup ? `🚀 Room: ${peer}` : `💬 Chat: @${peer}`;
      loadTargetMessageHistoryLogs();
      refreshDashboardDataSync();
    }

    async function loadTargetMessageHistoryLogs() {
      if (!peer) return;
      try {
        const res = await fetch(`/api/messages/${me}/${peer}`);
        const messages = await res.json();
        const container = document.getElementById('messagesContainer');
        container.innerHTML = '';
        messages.forEach(msg => renderSingleMessageBubble(msg));
        container.scrollTop = container.scrollHeight;
      } catch (err) { console.error("History logging error:", err); }
    }

    function renderSingleMessageBubble(msg) {
      const container = document.getElementById('messagesContainer');
      const div = document.createElement('div');
      const isSystemAlert = (msg.sender === "SYSTEM_ALERT" || msg.receiver === "ALL");
      
      div.className = `message ${isSystemAlert ? 'received' : (msg.sender === me ? 'sent' : 'received')}`;
      if (isSystemAlert) div.style.background = "#ef233c";

      let bodyHTML = `<div class="sender-label">@${msg.sender}</div>`;
      if (msg.message) bodyHTML += `<div>${msg.message}</div>`;

      if (msg.fileData) {
        if (msg.fileType && msg.fileType.startsWith('image/')) {
          bodyHTML += `<img src="${msg.fileData}" onclick="window.open('${msg.fileData}', '_blank')">`;
        } else {
          bodyHTML += `<a href="${msg.fileData}" download="${msg.fileName}" style="color:#00b4d8;display:block;margin-top:5px;">📁 File: ${msg.fileName}</a>`;
        }
      }
      div.innerHTML = bodyHTML;
      container.appendChild(div);
    }

    // FIXED: Prompt mechanics securely push data matching structural model shapes
    async function promptFriendAdd() {
      const targetUsername = prompt("Enter target username connection node:");
      if (!targetUsername) return;
      
      const res = await fetch('/api/friends/request', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ myUsername: me, friendUsername: targetUsername.trim() })
      });
      const data = await res.json();
      if (res.ok) { alert(data.message || "Connection request staged!"); refreshDashboardDataSync(); }
      else { alert(data.error || "Failed to process addition."); }
    }

    // FIXED: Parameter mappings cleanly pass authorization identities
    async function promptGroupCreate() {
      const name = prompt("Enter fresh group channel title:");
      if (!name) return;
      
      const res = await fetch('/api/groups/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name.trim(), creator: me })
      });
      if (res.ok) refreshDashboardDataSync();
    }

    async function processFriendRequestAction(requesterUsername, action) {
      await fetch(`/api/friends/${action}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ myUsername: me, requesterUsername })
      });
      refreshDashboardDataSync();
    }

    async function processGroupInviteAction(groupId, action) {
      await fetch(`/api/groups/${action}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ myUsername: me, groupId })
      });
      refreshDashboardDataSync();
    }

    function stageFileAttachment(event) {
      const file = event.target.files;
      if (!file) return;
      stagedFileName = file.name;
      stagedFileType = file.type;

      const reader = new FileReader();
      reader.onload = function(e) {
        stagedFileBuffer = e.target.result;
        document.getElementById('wipeBtn').classList.remove('hidden');
        alert(`Staged file: ${stagedFileName}`);
      };
      reader.readAsDataURL(file);
    }

    function clearStagedAttachmentFile() {
      stagedFileBuffer = null;
      stagedFileType = null;
      stagedFileName = null;
      document.getElementById('hiddenFileInput').value = '';
      document.getElementById('wipeBtn').classList.add('hidden');
    }

    async function openCameraViewport() {
      const video = document.getElementById('webcamStream');
      try {
        cameraVideoStreamObject = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        video.srcObject = cameraVideoStreamObject;
        document.getElementById('cameraViewportPanel').classList.remove('hidden');
      } catch (err) { alert("Hardware links busy."); }
    }

    function captureCameraSnapshot() {
      const video = document.getElementById('webcamStream');
      const canvas = document.createElement('canvas');
      canvas.width = 640; canvas.height = 480;
      const ctx = canvas.getContext('2d');
      ctx.translate(640, 0); ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, 640, 480);

      stagedFileBuffer = canvas.toDataURL('image/jpeg', 0.8);
      stagedFileType = 'image/jpeg';
      stagedFileName = `Snap_${Date.now().toString().slice(-4)}.jpg`;
      document.getElementById('wipeBtn').classList.remove('hidden');
      closeCameraViewport();
    }

    function closeCameraViewport() {
      if (cameraVideoStreamObject) cameraVideoStreamObject.getTracks().forEach(t => t.stop());
      document.getElementById('cameraViewportPanel').classList.add('hidden');
    }

    function handleKeyPress(e) {
      if (e.key === 'Enter') executeMessageDispatch();
    }

    function emitTypingState() {
      if (!peer) return;
      socket.emit('typing_status', { sender: me, receiver: peer, isTyping: true });
      clearTimeout(typingDebounceTimer);
      typingDebounceTimer = setTimeout(() => {
        socket.emit('typing_status', { sender: me, receiver: peer, isTyping: false });
      }, 2000);
    }

    function executeMessageDispatch() {
      const input = document.getElementById('messageInput');
      const txt = input.value.trim();
      if (!txt && !stagedFileBuffer) return;
      if (!peer) return alert("Select an open connection thread first.");

      socket.emit('private_message', {
        sender: me, receiver: peer, message: txt,
        fileData: stagedFileBuffer, fileType: stagedFileType, fileName: stagedFileName,
        isGroupChat: isGroup
      });
      
      input.value = '';
      clearStagedAttachmentFile();
    }

    socket.on('private_message', (msgNode) => {
      if (msgNode.receiver === "ALL" || (isGroup && msgNode.receiver === peer) || (!isGroup && !msgNode.isGroupChat && ((msgNode.sender === me && msgNode.receiver === peer) || (msgNode.sender === peer && msgNode.receiver === me)))) {
        renderSingleMessageBubble(msgNode);
        const container = document.getElementById('messagesContainer');
        container.scrollTop = container.scrollHeight;
      }
      if (msgNode.sender !== me) refreshDashboardDataSync();
    });

    socket.on('typing_status', (data) => {
      if (!peer || data.sender === me) return;
      const indicator = document.getElementById('typingStatusSlot');
      if (data.sender === peer && data.isTyping) {
        indicator.innerText = `@${data.sender} is typing...`;
      } else if (data.sender === peer) {
        indicator.innerText = '';
      }
    });

    socket.on('online_status_sync', (syncList) => {
      onlineUsersList = syncList.map(name => name.toLowerCase());
      refreshDashboardDataSync();
    });

    socket.on('dashboard_sync', () => refreshDashboardDataSync());

    function logout() {
      localStorage.clear();
      window.location.href = '/';
    }
  </script>
</body>
</html>
