<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blue Rocket - Dashboard</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; background: #0d1b2a; color: white; }
    .side { width: 25%; background: #1b263b; padding: 15px; border-right: 2px solid #415a77; display: flex; flex-direction: column; overflow-y: auto;}
    .main { width: 75%; display: flex; flex-direction: column; background: #000814; }
    .box { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .input-bar { padding: 15px; display: flex; gap: 10px; background: #1b263b; align-items: center; }
    input[type="text"] { flex-grow: 1; padding: 10px; border-radius: 5px; border: none; font-size: 16px; background: #415a77; color: white; }
    button { padding: 10px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    
    .nav-btn-grid { display: flex; gap: 10px; margin-bottom: 15px; }
    .friend-btn { flex-grow: 1; padding: 10px; background: #0077b6; color: white; border-radius: 5px; font-size: 13px; text-align: center; }
    .group-create-btn { flex-grow: 1; padding: 10px; background: #6a0dad; color: white; border-radius: 5px; font-size: 13px; text-align: center; }
    
    .friend-item { padding: 12px; background: #415a77; margin: 5px 0; border-radius: 5px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .friend-item:hover, .friend-item.active { background: #0077b6; }
    .req-item { padding: 10px; background: #5c677d; margin: 5px 0; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 14px;}
    .accept-btn { background: #38b000; color: white; padding: 4px 8px; font-size: 12px; margin-right: 5px; border-radius: 3px; }
    .decline-btn { background: #e63946; color: white; padding: 4px 8px; font-size: 12px; border-radius: 3px; }
    .delete-btn { background: #d90429; color: white; padding: 4px 8px; font-size: 11px; border-radius: 3px; }
    
    .send-btn { background: #00b4d8; color: white; }
    .wipe-btn { background: #d90429; color: white; }
    .media-btn { background: #e0e1dd; color: #0d1b2a; font-size: 18px; padding: 8px 12px; }
    h4 { margin: 15px 0 5px 0; color: #00b4d8; border-bottom: 1px solid #415a77; padding-bottom: 3px;}
    
    .msg-wrapper { max-width: 70%; padding: 10px; border-radius: 8px; line-break: anywhere; }
    .msg-me { background: #00b4d8; align-self: flex-end; color: black; }
    .msg-peer { background: #415a77; align-self: flex-start; color: white; }
    .msg-meta { font-size: 11px; opacity: 0.7; margin-bottom: 3px; font-weight: bold; }
    
    .chat-img, .chat-video { max-width: 250px; max-height: 250px; border-radius: 8px; margin-top: 5px; display: block; border: 2px solid rgba(255,255,255,0.1); }
    .file-link { color: #00b4d8; text-decoration: underline; font-weight: bold; display: inline-block; margin-top: 5px; }
    #cameraModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1b263b; padding: 20px; border-radius: 12px; border: 2px solid #00b4d8; text-align: center; z-index: 1000; }
    #videoFeed { width: 320px; height: 240px; background: #000; border-radius: 6px; transform: scaleX(-1); }
    
    #typingIndicator { font-style: italic; color: #38b000; font-size: 13px; margin-left: 15px; display: none; padding-bottom: 5px; }
  </style>
</head>
<body>

  <div id="cameraModal">
    <h3>Camera Capture Engine</h3>
    <video id="videoFeed" autoplay playsinline></video><br><br>
    <button onclick="capturePhoto()" style="background:#38b000; color:white;">📸 Snap Photo</button>
    <button onclick="closeCamera()" style="background:#d90429; color:white;">Cancel</button>
  </div>

  <div class="side">
    <div style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px;">
      <h3 id="nameTag" style="margin: 0; font-size: 20px; white-space: nowrap;">🚀 User</h3>
      <a href="/" onclick="localStorage.removeItem('username');" style="background: #e63946; color: white; padding: 8px 12px; font-size: 13px; border-radius: 5px; text-decoration: none; font-weight: bold; display: inline-block; text-align: center; width: fit-content;">Log Out</a>
    </div>

    <div class="nav-btn-grid">
      <button class="friend-btn" onclick="sendFriendRequest()">➕ Add Friend</button>
      <button class="group-create-btn" onclick="createGroupChat()">⚡ New Group</button>
    </div>
    
    <h4>Pending Requests 📩</h4>
    <div id="requestsBox"></div>

    <h4>Channels & Friends 🚀</h4>
    <div id="friendsBox"></div>
  </div>

  <div class="main">
    <div style="display:flex; justify-content:space-between; align-items:center; background:#1b263b; padding-right:15px;">
      <div id="target" style="padding:15px; font-size:18px; font-weight:bold;">No active chat</div>
      <div id="typingIndicator">typing...</div>
    </div>
    <div class="box" id="window"></div>
    <div class="input-bar">
      <input type="file" id="fileSelector" style="display:none;" onchange="handleFileUpload(this)">
      <button class="media-btn" onclick="document.getElementById('fileSelector').click()" title="Attach File">📎</button>
      <button class="media-btn" onclick="openCamera()" title="Open Camera">📷</button>
      <input type="text" id="msg" placeholder="Type a message safely..." onkeydown="handleKeyPress(event)" oninput="emitTypingStatus()">
      <button class="send-btn" onclick="send()">Send</button>
      <button class="wipe-btn" onclick="wipe()">Wipe</button>
    </div>
  </div>

  <script>
    const socket = io();
    const me = localStorage.getItem('username') || 'user';
    let peer = '';
    let isGroup = false;
    let streamInstance = null;
    let typingTimeout;

    document.getElementById('nameTag').innerText = `🚀 ${me}`;
    
    socket.emit('join', me);
    loadDashboardData();

    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        send();
      }
    }

    function emitTypingStatus() {
      if (!peer) return;
      socket.emit('typing_status', { sender: me, receiver: peer, isTyping: true });
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        socket.emit('typing_status', { sender: me, receiver: peer, isTyping: false });
      }, 2000);
    }

    async function loadDashboardData() {
      try {
        const res = await fetch(`/api/friends-data/${me}`);
        if (!res.ok) throw new Error("Dashboard sync failure");
        const data = await res.json();
        
        const friendsContainer = document.getElementById('friendsBox');
        friendsContainer.innerHTML = ''; 
        
        // Render stored groups
        const localGroups = JSON.parse(localStorage.getItem(`groups_${me}`) || "[]");
        localGroups.forEach(groupId => appendGroupDOM(groupId));

        // Render Direct Friends
        (data.friends || []).forEach(name => appendFriendDOM(name));

        // Render Request box
        const requestsContainer = document.getElementById('requestsBox');
        requestsContainer.innerHTML = ''; 
        (data.requests || []).forEach(name => appendRequestDOM(name));
      } catch (err) {
        console.error("Dashboard render stall caught:", err);
      }
    }

    function appendFriendDOM(name) {
      const box = document.getElementById('friendsBox');
      const div = document.createElement('div');
      div.className = `friend-item ${peer === name && !isGroup ? 'active' : ''}`;
      div.setAttribute('data-id', name);
      
      const span = document.createElement('span');
      span.innerText = `👤 ${name}`;
      div.appendChild(span);

      div.onclick = () => selectTargetChannel(name, false);

      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.innerText = 'Remove';
      delBtn.onclick = (e) => {
        e.stopPropagation();
        deleteFriend(name);
      };
      div.appendChild(delBtn);
      box.appendChild(div);
    }

    function appendGroupDOM(groupId) {
      const box = document.getElementById('friendsBox');
      const d = document.createElement('div');
      d.className = `friend-item ${peer === groupId && isGroup ? 'active' : ''}`;
      d.setAttribute('data-id', groupId);
      d.style.borderLeft = "4px solid #6a0dad";
      d.onclick = () => { selectTargetChannel(groupId, true); };
      
      const displayLabel = groupId.replace('group_', '').toUpperCase();
      d.innerHTML = `<span>👥 ${displayLabel}</span> <button class="delete-btn" onclick="removeGroupLocal(event, '${groupId}')">Exit</button>`;
      box.appendChild(d);
      socket.emit('join', groupId);
    }

    function removeGroupLocal(event, groupId) {
      event.stopPropagation();
      let localGroups = JSON.parse(localStorage.getItem(`groups_${me}`) || "[]");
      localGroups = localGroups.filter(g => g !== groupId);
      localStorage.setItem(`groups_${me}`, JSON.stringify(localGroups));
      if (peer === groupId) { 
        peer = ''; 
        document.getElementById('target').innerText = 'No active chat'; 
        document.getElementById('window').innerHTML = ''; 
      }
      loadDashboardData();
    }
        async function inviteToGroup(event, groupId) {
      event.stopPropagation(); 
      const targetUser = prompt("Enter username to invite to this group chat:");
      if (!targetUser) return;
      try {
        const res = await fetch('/api/groups/invite', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ groupId, creatorUsername: me, targetUsername: targetUser })
        });
        const data = await res.json();
        if (res.ok) alert("User added to group channel database successfully!");
        else alert(data.error || "Invite rejected.");
      } catch(err) { console.error("Group invitation pipe issue:", err); }
    }


    function appendRequestDOM(name) {
      const d = document.createElement('div');
      d.className = 'req-item';
      d.innerHTML = `<span>${name}</span><div><button class="accept-btn" onclick="acceptRequest('${name}')">Accept</button><button class="decline-btn" onclick="declineRequest('${name}')">Decline</button></div>`;
      document.getElementById('requestsBox').appendChild(d);
    }

    async function selectTargetChannel(name, isGroupRoom) {
      peer = name;
      isGroup = isGroupRoom;
      document.getElementById('typingIndicator').style.display = 'none';
      document.getElementById('target').innerText = isGroup ? `Group Room: ${name.replace('group_','').toUpperCase()}` : `Chatting with: @${name}`;
      document.getElementById('window').innerHTML = '';
          // 🚀 REST OF THE SCRIPT ENGINE
      const res = await fetch(`/api/messages/${me}/${name}`);
      const messages = await res.json();
      
      messages.forEach(msg => {
        const side = msg.sender === me ? 'right' : 'left';
        show(msg.message, side, msg.fileData, msg.fileType, msg.fileName, msg.sender);
      });
    }




        function show(messageText, side, fileData, fileType, fileName, senderName) {
      const win = document.getElementById('window');
      const div = document.createElement('div');
      
      div.className = 'msg-wrapper';
      div.style.maxWidth = '70%';
      div.style.padding = '10px';
      div.style.borderRadius = '8px';
      div.style.margin = '5px 0';
      div.style.lineBreak = 'anywhere';
      
      if (side === 'right') {
        div.style.background = '#00b4d8';
        div.style.alignSelf = 'flex-end';
        div.style.color = 'black';
      } else {
        div.style.background = '#415a77';
        div.style.alignSelf = 'flex-start';
        div.style.color = 'white';
      }
      
      const meta = document.createElement('div');
      meta.className = 'msg-meta';
      meta.style.fontSize = '11px';
      meta.style.opacity = '0.7';
      meta.style.marginBottom = '3px';
      meta.style.fontWeight = 'bold';
      meta.innerText = senderName || '';
      div.appendChild(meta);

      if (messageText) {
        const txt = document.createElement('span');
        txt.innerText = messageText;
        div.appendChild(txt);
      }

      if (fileData) {
        if (fileType && fileType.startsWith('image/')) {
          const img = document.createElement('img');
          img.src = fileData;
          img.style.maxWidth = '250px';
          img.style.maxHeight = '250px';
          img.style.borderRadius = '8px';
          div.appendChild(img);
        } else if (fileType && fileType.startsWith('video/')) {
          const vid = document.createElement('video');
          vid.src = fileData;
          vid.style.maxWidth = '250px';
          vid.style.maxHeight = '250px';
          vid.style.borderRadius = '8px';
          vid.controls = true;
          div.appendChild(vid);
        } else {
          const link = document.createElement('a');
          link.href = fileData;
          link.download = fileName || 'attachment';
          link.style.color = '#00b4d8';
          link.innerText = `📁 Download ${fileName || 'Attachment'}`;
          div.appendChild(link);
        }
      }

      win.appendChild(div);
      win.scrollTop = win.scrollHeight;
    }
        async function createGroupChat() {
      const gName = prompt("Enter new Group Chat name:");
      if (!gName) return;
      try {
        const res = await fetch('/api/groups/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: gName, creator: me })
        });
        const data = await res.json();
        if (res.ok && data.success) {
          const localGroups = JSON.parse(localStorage.getItem(`groups_${me}`) || "[]");
          localGroups.push(data.group.groupId);
          localStorage.setItem(`groups_${me}`, JSON.stringify(localGroups));
          loadDashboardData();
        } else { 
          alert(data.error || "Group creation failed."); 
        }
      } catch(err) { console.error("Group creation engine failed:", err); }
    }

    async function sendFriendRequest() {
      const name = prompt("Enter username to send request to:");
      if (!name) return;
      try {
        const res = await fetch('/api/friends/request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ myUsername: me, friendUsername: name })
        });
        const data = await res.json();
        if (res.ok) alert(`Friend request blasted to ${name}!`);
        else alert(data.error || "Failed to send request.");
      } catch(err) { console.error("Friend link system failed:", err); }
    }

    async function acceptRequest(target) {
      try {
        const res = await fetch('/api/friends/accept', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ myUsername: me, requesterUsername: target })
        });
        if (res.ok) loadDashboardData();
      } catch(err) { console.error(err); }
    }

    async function declineRequest(target) {
      try {
        const res = await fetch('/api/friends/decline', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ myUsername: me, requesterUsername: target })
        });
        if (res.ok) loadDashboardData();
      } catch(err) { console.error(err); }
    }

    async function deleteFriend(target) {
      if (!confirm(`Remove ${target} from friend networks?`)) return;
      try {
        const res = await fetch('/api/friends/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ myUsername: me, friendUsername: target })
        });
        if (res.ok) {
          if (peer === target) { 
            peer = ''; 
            document.getElementById('target').innerText = 'No active chat'; 
            document.getElementById('window').innerHTML = ''; 
          }
          loadDashboardData();
        }
      } catch(err) { console.error(err); }
    }



    

    function handleFileUpload(input) {
      if (!peer) return alert("Select a chat channel first!");
      const file = input.files;
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        const fileData = event.target.result; 
        if (!isGroup) show("", 'right', fileData, file.type, file.name, me);
        socket.emit('private_message', {
          sender: me,
          receiver: peer,
          message: "",
          fileData: fileData,
          fileType: file.type,
          fileName: file.name,
          isGroupChat: isGroup
        });
        input.value = ""; 
      };
      reader.readAsDataURL(file);
    }

    async function openCamera() {
      if (!peer) return alert("Select a chat channel first!");
      try {
        document.getElementById('cameraModal').style.display = 'block';
        streamInstance = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        document.getElementById('videoFeed').srcObject = streamInstance;
      } catch (err) {
        alert("Could not access camera. Ensure permissions are allowed.");
        closeCamera();
      }
    }

    function closeCamera() {
      document.getElementById('cameraModal').style.display = 'none';
      if (streamInstance) streamInstance.getTracks().forEach(track => track.stop());
    }

    function capturePhoto() {
      const video = document.getElementById('videoFeed');
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1); 
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const fileData = canvas.toDataURL('image/jpeg'); 
      
      if (!isGroup) show("", 'right', fileData, 'image/jpeg', 'snapshot.jpg', me);
      socket.emit('private_message', {
        sender: me,
        receiver: peer,
        message: "",
        fileData: fileData,
        fileType: 'image/jpeg',
        fileName: 'snapshot.jpg',
        isGroupChat: isGroup
      });
      closeCamera();
    }

    function send() {
      const txt = document.getElementById('msg').value;
      if(!txt || !peer) return;
      if (!isGroup) show(txt, 'right', null, null, null, me);
      socket.emit('private_message', { sender: me, receiver: peer, message: txt, isGroupChat: isGroup });
      document.getElementById('msg').value = '';
      socket.emit('typing_status', { sender: me, receiver: peer, isTyping: false });
    }

    socket.on('new_message', data => { 
      // 🚀 CRITICAL RECONSTRUCTION: FULL ISOLATION FOR SYSTEM BROADCASTS
      if (
        data.sender === "CREATOR_RED (ADMIN)" || 
        data.sender === "CREATOR_RED" || 
        data.receiver === "GLOBAL_BROADCAST"
      ) {
        alert(`🚨 SYSTEM BROADCAST FROM CREATOR:\n\n"${data.message}"`);
        return;
      }

      if (isGroup && data.receiver === peer) {
        show(data.message, data.sender === me ? 'right' : 'left', data.fileData, data.fileType, data.fileName, data.sender);
      } else if (!isGroup && data.sender === peer) {
        show(data.message, 'left', data.fileData, data.fileType, data.fileName, data.sender); 
      }
    });

    socket.on('peer_typing', data => {
      if (data.sender === peer || (isGroup && peer.startsWith('group_'))) {
        const element = document.getElementById('typingIndicator');
        if (data.isTyping) {
          element.innerText = data.sender + " is typing...";
          element.style.display = 'block';
        } else {
          element.style.display = 'none';
        }
      }
    });

    // 🛰️ ORIGINAL AUTOMATED DASHBOARD SYNCHRONIZATION EVENT
    socket.on('dashboard_sync', (data) => {
      if (data.username) {
        document.getElementById('nameTag').innerText = `🚀 ${data.username}`;
      }
            const friendsBox = document.getElementById('friendsBox');
      friendsBox.innerHTML = '';
      
      // 1. Reconstruct persistent Group layout tabs with Invite buttons
      const localGroups = JSON.parse(localStorage.getItem(`groups_${me}`) || "[]");
      localGroups.forEach(groupId => {
        const d = document.createElement('div');
        d.className = `friend-item ${peer === groupId && isGroup ? 'active' : ''}`;
        d.setAttribute('data-id', groupId);
        d.style.borderLeft = "4px solid #6a0dad";
        
        const displayLabel = groupId.replace('group_', '').toUpperCase();
        d.innerHTML = `
          <span>👥 ${displayLabel}</span> 
          <div>
            <button class="accept-btn" style="background:#6a0dad; color:white; padding:4px 8px; font-size:12px; border-radius:3px; margin-right:5px;" onclick="inviteToGroup(event, '${groupId}')">Invite</button>
            <button class="delete-btn" onclick="removeGroupLocal(event, '${groupId}')">Exit</button>
          </div>
        `;
        d.onclick = () => { selectTargetChannel(groupId, true); };
        friendsBox.appendChild(d);
      });

      // 2. Re-append standard direct message friends
      data.channels.forEach(ch => {
        const div = document.createElement('div');
        div.className = `friend-item ${peer === ch.name && !isGroup ? 'active' : ''}`;
        div.setAttribute('data-id', ch.name);
        div.innerHTML = `<span>👤 ${ch.name}</span> <button class="delete-btn" onclick="event.stopPropagation(); deleteFriend('${ch.name}')">Remove</button>`;
        div.onclick = () => selectTargetChannel(ch.name, false); 
        friendsBox.appendChild(div);
      });

      // 3. Clean and build pending requests
      const requestsBox = document.getElementById('requestsBox');
      requestsBox.innerHTML = '';
      data.requests.forEach(req => {
        const div = document.createElement('div');
        div.className = 'req-item';
        div.innerHTML = `
          <span>${req}</span>
          <div>
            <button class="accept-btn" onclick="acceptRequest('${req}')">✓</button>
            <button class="decline-btn" onclick="declineRequest('${req}')">✗</button>
          </div>
        `;
        requestsBox.appendChild(div);
      });

      
      const friendsBox = document.getElementById('friendsBox');
      friendsBox.innerHTML = '';
      
      data.channels.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'friend-item';
        div.innerText = `${ch.isGroup ? '👥' : '👤'} ${ch.name}`;
        div.onclick = () => selectTargetChannel(ch.name, ch.isGroup); 
        friendsBox.appendChild(div);
      });

      const requestsBox = document.getElementById('requestsBox');
      requestsBox.innerHTML = '';
      data.requests.forEach(req => {
        const div = document.createElement('div');
        div.className = 'req-item';
        div.innerHTML = `
          <span>${req}</span>
          <div>
            <button class="accept-btn" onclick="acceptRequest('${req}')">✓</button>
            <button class="decline-btn" onclick="declineRequest('${req}')">✗</button>
          </div>
        `;
        requestsBox.appendChild(div);
      });
    });

    socket.on('incoming_request', () => { loadDashboardData(); });
    socket.on('request_accepted', () => { loadDashboardData(); });
    socket.on('friend_deleted', () => { loadDashboardData(); });
    
    socket.on('chat_wiped', (data) => {
      if (data.isGroup && peer === data.receiver) {
        document.getElementById('window').innerHTML = '';
      } else if (!data.isGroup && data.wipedBy === peer) {
        document.getElementById('window').innerHTML = '';
      }
    });
  </script>
</body>
</html>
