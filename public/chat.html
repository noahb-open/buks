<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blue Rocket - Dashboard</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; background: #0d1b2a; color: white; }
    .side { width: 25%; background: #1b263b; padding: 15px; border-right: 2px solid #415a77; display: flex; flex-direction: column; overflow-y: auto;}
    .main { width: 75%; display: flex; flex-direction: column; background: #000814; }
    .box { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .input-bar { padding: 15px; display: flex; gap: 10px; background: #1b263b; align-items: center; }
    input[type="text"] { flex-grow: 1; padding: 10px; border-radius: 5px; border: none; font-size: 16px; background: #415a77; color: white; }
    button { padding: 10px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    
    .nav-btn-grid { display: flex; gap: 10px; margin-bottom: 15px; }
    .friend-btn { flex-grow: 1; padding: 10px; background: #0077b6; color: white; border-radius: 5px; font-size: 13px; text-align: center; }
    .group-create-btn { flex-grow: 1; padding: 10px; background: #6a0dad; color: white; border-radius: 5px; font-size: 13px; text-align: center; }
    
    .friend-item { padding: 12px; background: #415a77; margin: 5px 0; border-radius: 5px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .friend-item:hover, .friend-item.active { background: #0077b6; }
    .req-item { padding: 10px; background: #5c677d; margin: 5px 0; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 14px;}
    .accept-btn { background: #38b000; color: white; padding: 4px 8px; font-size: 12px; margin-right: 5px; border-radius: 3px; }
    .decline-btn { background: #e63946; color: white; padding: 4px 8px; font-size: 12px; border-radius: 3px; }
    .delete-btn { background: #d90429; color: white; padding: 4px 8px; font-size: 11px; border-radius: 3px; }
    
    .send-btn { background: #00b4d8; color: white; }
    .wipe-btn { background: #d90429; color: white; }
    .media-btn { background: #e0e1dd; color: #0d1b2a; font-size: 18px; padding: 8px 12px; }
    h4 { margin: 15px 0 5px 0; color: #00b4d8; border-bottom: 1px solid #415a77; padding-bottom: 3px;}
    
    .msg-wrapper { max-width: 70%; padding: 10px; border-radius: 8px; line-break: anywhere; margin: 5px 0; }
    .msg-me { background: #00b4d8; align-self: flex-end; color: black; }
    .msg-peer { background: #415a77; align-self: flex-start; color: white; }
    .msg-meta { font-size: 11px; opacity: 0.7; margin-bottom: 3px; font-weight: bold; }
    
    .chat-img, .chat-video { max-width: 250px; max-height: 250px; border-radius: 8px; margin-top: 5px; display: block; border: 2px solid rgba(255,255,255,0.1); }
    .file-link { color: #00b4d8; text-decoration: underline; font-weight: bold; display: inline-block; margin-top: 5px; }
    #cameraModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1b263b; padding: 20px; border-radius: 12px; border: 2px solid #00b4d8; text-align: center; z-index: 1000; }
    #videoFeed { width: 320px; height: 240px; background: #000; border-radius: 6px; transform: scaleX(-1); }
    
    #typingIndicator { font-style: italic; color: #38b000; font-size: 13px; margin-left: 15px; display: none; padding-bottom: 5px; }
    #rosterBar { font-size: 12px; color: #a4c3b2; opacity: 0.8; margin-top: 3px; font-weight: normal; }
  </style>
</head>
<body>

  <!-- Camera Capture Modal -->
  <div id="cameraModal">
    <h3>Camera Capture Engine</h3>
    <video id="videoFeed" autoplay playsinline></video><br><br>
    <button onclick="capturePhoto()" style="background:#38b000; color:white;">📸 Snap Photo</button>
    <button onclick="closeCamera()" style="background:#d90429; color:white;">Cancel</button>
  </div>

  <!-- 📞 Fullscreen WebRTC Video Call Overlay Viewport Panel -->
  <div id="videoCallModal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(13, 27, 42, 0.95); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; gap: 20px;">
    <h2 id="callStatusHeader" style="margin: 0; font-size: 24px; color: #00b4d8;">📞 Calling...</h2>
    <div style="display: flex; gap: 20px; width: 80%; justify-content: center; position: relative;">
      <video id="remoteVideoFeed" autoplay playsinline style="width: 640px; height: 480px; background: #000; border-radius: 12px; border: 3px solid #415a77;"></video>
      <video id="localVideoFeed" autoplay playsinline muted style="width: 200px; height: 150px; background: #000; border-radius: 8px; border: 2px solid #00b4d8; position: absolute; bottom: 20px; right: 20px; transform: scaleX(-1);"></video>
    </div>
    <div style="display: flex; gap: 15px;">
      <button id="acceptCallBtn" onclick="answerIncomingCallPipeline()" style="background: #38b000; color: white; display: none; padding: 12px 25px; font-size: 16px;">✓ Answer Call</button>
      <button onclick="terminateActiveCallSession()" style="background: #d90429; color: white; padding: 12px 25px; font-size: 16px;">🛑 Hang Up</button>
    </div>
  </div>

  <div class="side">
    <div style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px;">
      <h3 id="nameTag" style="margin: 0; font-size: 20px; white-space: nowrap;">🚀 User</h3>
      <a href="/" onclick="localStorage.removeItem('username');" style="background: #e63946; color: white; padding: 8px 12px; font-size: 13px; border-radius: 5px; text-decoration: none; font-weight: bold; display: inline-block; text-align: center; width: fit-content;">Log Out</a>
    </div>

    <div class="nav-btn-grid">
      <button class="friend-btn" onclick="sendFriendRequest()">➕ Add Friend</button>
      <button class="group-create-btn" onclick="createGroupChat()">⚡ New Group</button>
    </div>
    
    <h4>Pending Requests 📩</h4>
    <div id="requestsBox"></div>

    <h4>Group Invites 👥</h4>
    <div id="groupInvitesBox"></div>

    <h4>Channels & Friends 🚀</h4>
    <div id="friendsBox"></div>
  </div>

  <div class="main">
    <div style="display:flex; justify-content:space-between; align-items:center; background:#1b263b; padding-right:15px;">
      <div style="padding:15px; font-size:18px; font-weight:bold; display: flex; flex-direction: column;">
        <span id="target">No active chat</span>
        <span id="rosterBar"></span>
      </div>
      <div id="typingIndicator">typing...</div>
    </div>
    <div class="box" id="window"></div>
    <div class="input-bar">
      <input type="file" id="fileSelector" style="display:none;" onchange="handleFileUpload(this)">
      <button class="media-btn" onclick="document.getElementById('fileSelector').click()" title="Attach File">📎</button>
      <button class="media-btn" onclick="openCamera()" title="Open Camera">📷</button>
      <input type="text" id="msg" placeholder="Type a message safely..." onkeydown="handleKeyPress(event)" oninput="emitTypingStatus()">
      <button class="send-btn" onclick="send()">Send</button>
      <button class="wipe-btn" onclick="wipe()">Wipe</button>
    </div>
  </div>

  <script>
    const socket = io();
    const me = localStorage.getItem('username') || 'user';
    let peer = '';
    let isGroup = false;
    let streamInstance = null;
    let typingTimeout;
    
    // Global tracking storage indicators
    let globalOnlineUsers = [];
    let unreadChannels = {};

    document.getElementById('nameTag').innerText = `🚀 ${me}`;
    
    socket.emit('join', me);
    socket.emit('request_online_sync');
    loadDashboardData();

    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        send();
      }
    }

    function emitTypingStatus() {
      if (!peer) return;
      socket.emit('typing_status', { sender: me, receiver: peer, isTyping: true });
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        socket.emit('typing_status', { sender: me, receiver: peer, isTyping: false });
      }, 2000);
    }

    async function loadDashboardData() {
      try {
        const res = await fetch(`/api/friends-data/${me}`);
        if (!res.ok) throw new Error("Dashboard sync failure");
        const data = await res.json();
        
        let onLoadFriendsBox = document.getElementById('friendsBox');
        if (onLoadFriendsBox) onLoadFriendsBox.innerHTML = ''; 
        
        // Render stored groups
        const localGroups = JSON.parse(localStorage.getItem(`groups_${me}`) || "[]");
        localGroups.forEach(groupId => appendGroupDOM(groupId));

        // Render Direct Friends
        (data.friends || []).forEach(name => appendFriendDOM(name));

        // Render Request box
        const requestsContainer = document.getElementById('requestsBox');
        if (requestsContainer) {
          requestsContainer.innerHTML = ''; 
          (data.requests || []).forEach(name => appendRequestDOM(name));
        }

        // Render group requests tray
        const groupInvitesBox = document.getElementById('groupInvitesBox');
        if (groupInvitesBox) {
          groupInvitesBox.innerHTML = '';
          (data.groupRequests || []).forEach(req => appendGroupInviteDOM(req));
        }
      } catch (err) {
        console.error("Dashboard render stall caught:", err);
      }
    }

    function appendFriendDOM(name) {
      const box = document.getElementById('friendsBox');
      const div = document.createElement('div');
      
      const isUnread = unreadChannels[name] === true && peer !== name;
      div.className = `friend-item ${peer === name && !isGroup ? 'active' : ''}`;
      if (isUnread) div.style.background = '#d90429'; 
        const data = await res.json();
        if (res.ok && data.success) {
          const localGroups = JSON.parse(localStorage.getItem(`groups_${me}`) || "[]");
          localGroups.push(data.group.groupId);
          localStorage.setItem(`groups_${me}`, JSON.stringify(localGroups));
          loadDashboardData();
        } else { alert(data.error || "Group creation failed."); }
      } catch(err) { console.error(err); }
    }

    async function sendFriendRequest() {
      const name = prompt("Enter username to send request to:");
      if (!name) return;
      try {
        const res = await fetch('/api/friends/request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ myUsername: me, friendUsername: name })
        });
        const data = await res.json();
        if (res.ok) alert(`Friend request blasted to ${name}!`);
        else alert(data.error || "Failed to send request.");
      } catch(err) { console.error(err); }
    }

    async function acceptRequest(target) {
      try {
        const res = await fetch('/api/friends/accept', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ myUsername: me, requesterUsername: target })
        });
        if (res.ok) loadDashboardData();
      } catch(err) { console.error(err); }
    }

    async function declineRequest(target) {
      try {
        const res = await fetch('/api/friends/decline', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ myUsername: me, requesterUsername: target })
        });
        if (res.ok) loadDashboardData();
      } catch(err) { console.error(err); }
    }

    async function deleteFriend(target) {
      if (!confirm(`Remove ${target} from friend networks?`)) return;
      try {
        const res = await fetch('/api/friends/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ myUsername: me, friendUsername: target })
        });
        if (res.ok) {
          if (peer === target) { peer = ''; document.getElementById('target').innerText = 'No active chat'; document.getElementById('rosterBar').innerText = ''; document.getElementById('window').innerHTML = ''; }
          loadDashboardData();
        }
      } catch(err) { console.error(err); }
    }

    // Realtime Socket Observers
    socket.on('new_message', data => { 
      if (data.sender === "CREATOR_RED (ADMIN)" || data.sender === "CREATOR_RED" || data.receiver === "GLOBAL_BROADCAST") {
        alert(`🚨 SYSTEM BROADCAST FROM CREATOR:\n\n"${data.message}"`);
        return;
      }

      const incomingChannel = data.isGroupChat ? data.receiver : data.sender;

      if (isGroup && data.receiver === peer) {
        show(data.message, data.sender === me ? 'right' : 'left', data.fileData, data.fileType, data.fileName, data.sender);
      } else if (!isGroup && !data.isGroupChat && (data.sender === peer || (data.sender === me && data.receiver === peer))) {
        show(data.message, data.sender === me ? 'right' : 'left', data.fileData, data.fileType, data.fileName, data.sender); 
      } else {
        // 🚨 FLARING SYSTEM: Check background streams to flag unread targets red
        if (data.sender !== me) {
          unreadChannels[incomingChannel] = true;
        }
      }
      
      // Paint updates live
      loadDashboardData();
    });

    socket.on('peer_typing', data => {
      if (data.sender === peer || (isGroup && peer.startsWith('group_'))) {
        const element = document.getElementById('typingIndicator');
        if (data.isTyping) {
          element.innerText = data.sender + " is typing...";
          element.style.display = 'block';
        } else {
          element.style.display = 'none';
        }
      }
    });

    // 🛰️ CLEAN REPAIRED DASHBOARD SYNCHRONIZATION EVENT
    socket.on('dashboard_sync', (data) => {
      if (data.username) {
        document.getElementById('nameTag').innerText = `🚀 ${data.username}`;
      }
      
      let syncFriendsBox = document.getElementById('friendsBox');
      if (syncFriendsBox) syncFriendsBox.innerHTML = '';
      
      // 1. Reconstruct Group tabs
      const localGroups = JSON.parse(localStorage.getItem(`groups_${me}`) || "[]");
      localGroups.forEach(groupId => {
        const d = document.createElement('div');
        const isGroupUnread = unreadChannels[groupId] === true && peer !== groupId;
        
        d.className = `friend-item ${peer === groupId && isGroup ? 'active' : ''}`;
        d.setAttribute('data-id', groupId);
        
        if (isGroupUnread) d.style.background = '#d90429';
        else d.style.borderLeft = "4px solid #6a0dad";
        
        const displayLabel = groupId.replace('group_', '').toUpperCase();
        d.innerHTML = `
          <span>👥 ${displayLabel}</span> 
          <div>
            <button class="accept-btn" style="background:#6a0dad; color:white; padding:4px 8px; font-size:12px; border-radius:3px; margin-right:5px;" onclick="inviteToGroup(event, '${groupId}')">Invite</button>
            <button class="delete-btn" onclick="removeGroupLocal(event, '${groupId}')">Exit</button>
          </div>
        `;
        d.onclick = () => { selectTargetChannel(groupId, true); };
        if (syncFriendsBox) syncFriendsBox.appendChild(d);
      });

      // 2. Re-append Direct friends
      data.channels.forEach(ch => {
        appendFriendDOM(ch.name);
      });

      // 3. Re-append Request containers
      const requestsBox = document.getElementById('requestsBox');
      if (requestsBox) {
        requestsBox.innerHTML = '';
        data.requests.forEach(req => {
          const div = document.createElement('div');
          div.className = 'req-item';
          div.innerHTML = `
            <span>${req}</span>
            <div>
              <button class="accept-btn" onclick="acceptRequest('${req}')">✓</button>
              <button class="decline-btn" onclick="declineRequest('${req}')">✗</button>
            </div>
          `;
          requestsBox.appendChild(div);
        });
      }

      // Re-append Group Invites containers dynamically on socket sync signals
      const groupInvitesBox = document.getElementById('groupInvitesBox');
      if (groupInvitesBox) {
        groupInvitesBox.innerHTML = '';
        (data.groupRequests || []).forEach(gReq => {
          appendGroupInviteDOM(gReq);
        });
      }
    });

    socket.on('online_status_sync', (onlineUsersArray) => {
      globalOnlineUsers = onlineUsersArray;
      loadDashboardData(); 
    });

    socket.on('incoming_request', () => { loadDashboardData(); });
    socket.on('incoming_group_request', () => { loadDashboardData(); }); 
    socket.on('request_accepted', () => { loadDashboardData(); });
    socket.on('friend_deleted', () => { loadDashboardData(); });

    socket.on('chat_wiped', (data) => {
      if ((data.isGroup && peer === data.receiver) || (!data.isGroup && (data.wipedBy === peer || data.receiver === peer))) {
        document.getElementById('window').innerHTML = '';
      }
    });

    socket.emit('request_online_sync');
  </script>
</body>
</html>
