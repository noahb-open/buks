<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blue Rocket - Dashboard</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; background: #0d1b2a; color: white; }
    .side { width: 25%; background: #1b263b; padding: 15px; border-right: 2px solid #415a77; display: flex; flex-direction: column; overflow-y: auto;}
    .main { width: 75%; display: flex; flex-direction: column; background: #000814; }
    .box { flex-grow: 1; padding: 20px; overflow-y: auto; }
    .input-bar { padding: 15px; display: flex; gap: 10px; background: #1b263b; align-items: center; }
    input[type="text"] { flex-grow: 1; padding: 10px; border-radius: 5px; border: none; font-size: 16px; }
    button { padding: 10px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    
    .nav-btn-grid { display: flex; gap: 10px; margin-bottom: 15px; }
    .friend-btn { flex-grow: 1; padding: 10px; background: #0077b6; color: white; }
    .group-create-btn { flex-grow: 1; padding: 10px; background: #6a0dad; color: white; }
    
    .friend-item { padding: 12px; background: #415a77; margin: 5px 0; border-radius: 5px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .friend-item:hover { background: #0077b6; }
    .req-item { padding: 10px; background: #5c677d; margin: 5px 0; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 14px;}
    .accept-btn { background: #38b000; color: white; padding: 4px 8px; font-size: 12px; margin-right: 5px; border-radius: 3px; }
    .decline-btn { background: #e63946; color: white; padding: 4px 8px; font-size: 12px; border-radius: 3px; }
    .delete-btn { background: #d90429; color: white; padding: 4px 8px; font-size: 11px; border-radius: 3px; }
    
    .send-btn { background: #00b4d8; color: white; }
    .wipe-btn { background: #d90429; color: white; }
    .media-btn { background: #e0e1dd; color: #0d1b2a; font-size: 18px; padding: 8px 12px; }
    h4 { margin: 15px 0 5px 0; color: #00b4d8; border-bottom: 1px solid #415a77; padding-bottom: 3px;}
    
    .chat-img, .chat-video { max-width: 250px; max-height: 250px; border-radius: 8px; margin-top: 5px; display: block; border: 2px solid rgba(255,255,255,0.1); }
    .file-link { color: #00b4d8; text-decoration: underline; font-weight: bold; display: inline-block; margin-top: 5px; }
    #cameraModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1b263b; padding: 20px; border-radius: 12px; border: 2px solid #00b4d8; text-align: center; z-index: 1000; }
    #videoFeed { width: 320px; height: 240px; background: #000; border-radius: 6px; transform: scaleX(-1); }
    
    #typingIndicator { font-style: italic; color: #38b000; font-size: 13px; margin-left: 15px; display: none; padding-bottom: 5px; }
  </style>
</head>
<body>

  <div id="cameraModal">
    <h3>Camera Capture Engine</h3>
    <video id="videoFeed" autoplay playsinline></video><br><br>
    <button onclick="capturePhoto()" style="background:#38b000; color:white;">📸 Snap Photo</button>
    <button onclick="closeCamera()" style="background:#d90429; color:white;">Cancel</button>
  </div>

   <div class="side">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
      <h3 id="nameTag" style="margin: 0;">🚀 User</h3>
      <!-- 🔴 NEW LOGOUT BUTTON -->
      <!-- Check your sidebar HTML to ensure it uses the matching trigger name -->
     <!-- 🚀 DIRECT HYPERLINK LOGOUT BYPASS -->
<a href="messa.up.railway.app" 
   onclick="localStorage.removeItem('username');" 
   style="background: #e63946; color: white; padding: 6px 12px; font-size: 13px; border-radius: 5px; text-decoration: none; font-weight: bold; display: inline-block;">
   Log Out
</a>


    
    <h4>Pending Requests 📩</h4>
    <div id="requestsBox"></div>

    <h4>Channels & Friends 🚀</h4>
    <div id="friendsBox"></div>
  </div>
  <div class="main">
    <div style="display:flex; justify-content:space-between; align-items:center; background:#1b263b; padding-right:15px;">
      <div id="target" style="padding:15px; font-size:18px; font-weight:bold;">No active chat</div>
      <div id="typingIndicator">typing...</div>
    </div>
    <div class="box" id="window"></div>
    <div class="input-bar">
      <input type="file" id="fileSelector" style="display:none;" onchange="handleFileUpload(this)">
      <button class="media-btn" onclick="document.getElementById('fileSelector').click()" title="Attach File">📎</button>
      <button class="media-btn" onclick="openCamera()" title="Open Camera">📷</button>
      <input type="text" id="msg" placeholder="Type a message safely..." onkeydown="handleKeyPress(event)" oninput="emitTypingStatus()">
      <button class="send-btn" onclick="send()">Send</button>
      <button class="wipe-btn" onclick="wipe()">Wipe</button>
    </div>
  </div>

  <script>
    const socket = io();
    const me = localStorage.getItem('username') || 'user';
    let peer = '';
    let isGroup = false;
    let streamInstance = null;
    let typingTimeout;
    
    document.getElementById('nameTag').innerText = `🚀 ${me}`;
    socket.emit('join', me);

    loadDashboardData();

    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        send();
      }
    }

    function emitTypingStatus() {
      if (!peer) return;
      socket.emit('typing_status', { sender: me, receiver: peer, isTyping: true });
      
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        socket.emit('typing_status', { sender: me, receiver: peer, isTyping: false });
      }, 2000);
    }

    async function loadDashboardData() {
      try {
        const res = await fetch(`/api/friends-data/${me}`);
        if (!res.ok) throw new Error("Dashboard sync failure");
        const data = await res.json();
        
        const currentFriends = data.friends || [];
        const currentRequests = data.requests || [];

        const friendsContainer = document.getElementById('friendsBox');
        friendsContainer.innerHTML = ''; 
        
        const localGroups = JSON.parse(localStorage.getItem(`groups_${me}`) || "[]");
        localGroups.forEach(groupName => appendGroupDOM(groupName));

        currentFriends.forEach(name => appendFriendDOM(name));

        const requestsContainer = document.getElementById('requestsBox');
        requestsContainer.innerHTML = ''; 
        currentRequests.forEach(name => appendRequestDOM(name));
      } catch (err) {
        console.error("Dashboard render stall caught:", err);
      }
    }

    function createGroupChat() {
      const gName = prompt("Put the name of the group you want to make/join:");
      if (!gName) return;
      
      const cleanGid = 'group_' + gName.toLowerCase().replace(/[^a-z0-9]/g, '_');
      
      const localGroups = JSON.parse(localStorage.getItem(`groups_${me}`) || "[]");
      if (localGroups.includes(cleanGid)) return alert("You are already in this group room!");
      
      localGroups.push(cleanGid);
      localStorage.setItem(`groups_${me}`, JSON.stringify(localGroups));
      
      socket.emit('join', cleanGid);
      loadDashboardData();
    }

    async function sendFriendRequest() {
      const name = prompt("Enter username to send request to:");
      if(!name) return;
      try {
        const res = await fetch('/api/friends/request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ myUsername: me, friendUsername: name })
        });
        const data = await res.json();
        if(res.ok) alert(`Friend request blasted to ${name}!`);
        else alert(data.error || "Failed to send request.");
      } catch (err) { alert("Network communication error."); }
    }

    async function acceptRequest(senderName) {
      const res = await fetch('/api/friends/accept', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ myUsername: me, requesterUsername: senderName })
      });
      if(res.ok) loadDashboardData();
    }

    async function declineRequest(senderName) {
      const res = await fetch('/api/friends/decline', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ myUsername: me, requesterUsername: senderName })
      });
      if(res.ok) loadDashboardData();
    }

    async function deleteFriend(event, friendName) {
      event.stopPropagation(); 
      if (!confirm("Remove " + friendName + "?")) return;
      const res = await fetch('/api/friends/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ myUsername: me, friendUsername: friendName })
      });
      if(res.ok) {
        if (peer === friendName) { peer = ''; document.getElementById('target').innerText = 'No active chat'; document.getElementById('window').innerHTML = ''; }
        loadDashboardData();
      }
    }

    function appendFriendDOM(name) {
      const d = document.createElement('div');
      d.className = 'friend-item';
      d.onclick = () => { selectTargetChannel(name, false); };
      d.innerHTML = `<span>👤 ${name}</span> <button class="delete-btn" onclick="deleteFriend(event, '${name}')">Remove</button>`;
      document.getElementById('friendsBox').appendChild(d);
    }

    function appendGroupDOM(groupId) {
      const d = document.createElement('div');
      d.className = 'friend-item';
      d.style.borderLeft = "4px solid #6a0dad";
      d.onclick = () => { selectTargetChannel(groupId, true); };
      const displayLabel = groupId.replace('group_', '').toUpperCase();
      d.innerHTML = `<span>👥 ${displayLabel}</span> <button class="delete-btn" onclick="removeGroupLocal(event, '${groupId}')">Exit</button>`;
      document.getElementById('friendsBox').appendChild(d);
      socket.emit('join', groupId);
    }

    function removeGroupLocal(event, groupId) {
      event.stopPropagation();
      let localGroups = JSON.parse(localStorage.getItem(`groups_${me}`) || "[]");
            localGroups = localGroups.filter(g => g !== groupId);
      localStorage.setItem(`groups_${me}`, JSON.stringify(localGroups));
      if (peer === groupId) { 
        peer = ''; 
        document.getElementById('target').innerText = 'No active chat'; 
        document.getElementById('window').innerHTML = ''; 
      }
      loadDashboardData();
    }

    function appendRequestDOM(name) {
      const d = document.createElement('div');
      d.className = 'req-item';
      d.innerHTML = `<span>${name}</span><div><button class="accept-btn" onclick="acceptRequest('${name}')">Accept</button><button class="decline-btn" onclick="declineRequest('${name}')">Decline</button></div>`;
      document.getElementById('requestsBox').appendChild(d);
    }

    async function selectTargetChannel(name, isGroupRoom) {
      peer = name;
      isGroup = isGroupRoom;
      document.getElementById('typingIndicator').style.display = 'none';
      document.getElementById('target').innerText = isGroup ? `Group Room: ${name.replace('group_','').toUpperCase()}` : `Chatting with: ${name}`;
      document.getElementById('window').innerHTML = '';

      const res = await fetch(`/api/messages/${me}/${name}`);
      const messages = await res.json();
      
      messages.forEach(msg => {
        const side = msg.sender === me ? 'right' : 'left';
        show(msg.message, side, msg.fileData, msg.fileType, msg.fileName, msg.sender);
      });
    }

    function handleFileUpload(input) {
      if (!peer) return alert("Select a chat channel first!");
      const file = input.files;
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        const fileData = event.target.result; 
        if (!isGroup) show("", 'right', fileData, file.type, file.name, me);
        socket.emit('private_message', {
          sender: me,
          receiver: peer,
          message: "",
          fileData: fileData,
          fileType: file.type,
          fileName: file.name,
          isGroupChat: isGroup
        });
        input.value = ""; 
      };
      reader.readAsDataURL(file);
    }

    async function openCamera() {
      if (!peer) return alert("Select a chat channel first!");
      try {
        document.getElementById('cameraModal').style.display = 'block';
        streamInstance = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        document.getElementById('videoFeed').srcObject = streamInstance;
      } catch (err) {
        alert("Could not access camera. Ensure permissions are allowed.");
        closeCamera();
      }
    }

    function closeCamera() {
      document.getElementById('cameraModal').style.display = 'none';
      if (streamInstance) streamInstance.getTracks().forEach(track => track.stop());
    }

    function capturePhoto() {
      const video = document.getElementById('videoFeed');
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1); 
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const fileData = canvas.toDataURL('image/jpeg'); 
      
      if (!isGroup) show("", 'right', fileData, 'image/jpeg', 'snapshot.jpg', me);
      socket.emit('private_message', {
        sender: me,
        receiver: peer,
        message: "",
        fileData: fileData,
        fileType: 'image/jpeg',
        fileName: 'snapshot.jpg',
        isGroupChat: isGroup
      });
      closeCamera();
    }

    function send() {
      const txt = document.getElementById('msg').value;
      if(!txt || !peer) return;
      if (!isGroup) show(txt, 'right', null, null, null, me);
      socket.emit('private_message', { sender: me, receiver: peer, message: txt, isGroupChat: isGroup });
      document.getElementById('msg').value = '';
      socket.emit('typing_status', { sender: me, receiver: peer, isTyping: false });
    }

       socket.on('new_message', data => { 
      // 🚀 CRITICAL RECONSTRUCTION: FULL ISOLATION FOR SYSTEM BROADCASTS
      if (
        data.sender === "CREATOR_RED (ADMIN)" || 
        data.sender === "CREATOR_RED" || 
        data.receiver === "GLOBAL_BROADCAST"
      ) {
        // Step 1: Prompt the notification modal instantly
        alert(`🚨 SYSTEM BROADCAST FROM CREATOR:\n\n"${data.message}"`);
        
        // Step 2: FORCE AN EARLY RETURN AND DROP THE PACKET COMPLETELY
        // By cutting execution line right here, it can never trigger your text inputs,
        // it can never auto-send to your friend, and it stays out of your chat history.
        return;
      }

      // Standard peer-to-peer message routing remains untouched below
      if (isGroup && data.receiver === peer) {
        show(data.message, data.sender === me ? 'right' : 'left', data.fileData, data.fileType, data.fileName, data.sender);
      } else if (!isGroup && data.sender === peer) {
        show(data.message, 'left', data.fileData, data.fileType, data.fileName, data.sender); 
      }
    });


    socket.on('peer_typing', data => {
      if (data.sender === peer || (isGroup && peer.startsWith('group_'))) {
        const element = document.getElementById('typingIndicator');
        if (data.isTyping) {
          element.innerText = data.sender + " is typing...";
          element.style.display = 'block';
        } else {
          element.style.display = 'none';
        }
      }
    });

    socket.on('incoming_request', () => { loadDashboardData(); });
    socket.on('request_accepted', () => { loadDashboardData(); });
    socket.on('friend_deleted', () => { loadDashboardData(); });
    
    socket.on('chat_wiped', (data) => {
      if (data.isGroup && peer === data.receiver) {
        document.getElementById('window').innerHTML = '';
      } else if (!data.isGroup && data.wipedBy === peer) {
        document.getElementById('window').innerHTML = '';
      }
    });

    async function wipe() {
      if(!peer) return;
      if (!confirm("Permanently wipe conversation history for everyone?")) return;
      await fetch('/api/messages/delete', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ sender: me, receiver: peer })
      });
      document.getElementById('window').innerHTML = '';
      socket.emit('trigger_wipe', { sender: me, receiver: peer, isGroupChat: isGroup });
    }

    function show(t, side, fileData = null, fileType = null, fileName = null, speakerName = '') {
      const el = document.createElement('div');
      el.style.textAlign = side === 'right' ? 'right' : 'left';
      el.style.margin = "10px 0";
      
      const inner = document.createElement('div');
      inner.style.background = side === 'right' ? '#0077b6' : '#222';
      inner.style.padding = "10px";
      inner.style.borderRadius = "8px";
      inner.style.maxWidth = "60%";
      inner.style.display = "inline-block";
      inner.style.textAlign = "left";
      
      if (isGroup && speakerName && side === 'left') {
        const nameHeader = document.createElement('div');
        nameHeader.innerText = speakerName;
        nameHeader.style.fontSize = "11px";
        nameHeader.style.color = "#00b4d8";
        nameHeader.style.fontWeight = "bold";
        nameHeader.style.marginBottom = "3px";
        inner.appendChild(nameHeader);
      }
      
      if (t) {
        const textNode = document.createElement('div');
        textNode.innerText = t;
        inner.appendChild(textNode);
      }
      
      if (fileData) {
        if (fileType && fileType.startsWith('image/')) {
          const img = document.createElement('img');
          img.src = fileData;
          img.className = 'chat-img';
          inner.appendChild(img);
        } else if (fileType && fileType.startsWith('video/')) {
          const videoElement = document.createElement('video');
          videoElement.src = fileData;
          videoElement.className = 'chat-video';
          videoElement.controls = true;
          inner.appendChild(videoElement);
        } else {
          const link = document.createElement('a');
          link.href = fileData;
          link.download = fileName || "download";
          link.className = 'file-link';
          link.innerText = "📄 Download: " + (fileName || "Attached File");
          inner.appendChild(link);
        }
      }
          }
  }

  // 🟢 First, we finish and append the elements for the show function
  el.appendChild(inner);
  document.getElementById('window').appendChild(el);
  const win = document.getElementById('window');
  win.scrollTop = win.scrollHeight;
} // 🟢 This closing bracket completely finishes the show() function safely

// 🔴 NOW LOGOUT SITS CLEANLY OUTSIDE ON ITS OWN
function triggerLogout() {
  if (!confirm("Are you sure you want to log out of Blue Rocket?")) return;
  
  // Step 1: Tell the server we are leaving so it decouples our active socket session
  socket.disconnect();
  
  // Step 2: Clear user tracking parameters
  localStorage.removeItem('username');
  
  // Step 3: Evacuate back to the login launchpad portal
  window.location.href = '/index.html';
}
</script>
</body>
</html>
