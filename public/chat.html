<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blue Rocket - Dashboard</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; background: #0d1b2a; color: white; }
    .side { width: 25%; background: #1b263b; padding: 15px; border-right: 2px solid #415a77; display: flex; flex-direction: column; overflow-y: auto;}
    .main { width: 75%; display: flex; flex-direction: column; background: #000814; }
    .box { flex-grow: 1; padding: 20px; overflow-y: auto; }
    .input-bar { padding: 15px; display: flex; gap: 10px; background: #1b263b; }
    input { flex-grow: 1; padding: 10px; border-radius: 5px; border: none; font-size: 16px; }
    button { padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    .friend-btn { width: 100%; padding: 10px; background: #0077b6; color: white; margin-bottom: 15px; }
    
    /* Layout styling blocks */
    .friend-item { padding: 12px; background: #415a77; margin: 5px 0; border-radius: 5px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
    .friend-item:hover { background: #0077b6; }
    .req-item { padding: 10px; background: #5c677d; margin: 5px 0; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 14px;}
    
    /* Action Buttons styling */
    .accept-btn { background: #38b000; color: white; padding: 4px 8px; font-size: 12px; margin-right: 5px; border-radius: 3px; }
    .decline-btn { background: #e63946; color: white; padding: 4px 8px; font-size: 12px; border-radius: 3px; }
    .delete-btn { background: #d90429; color: white; padding: 4px 8px; font-size: 11px; border-radius: 3px; opacity: 0.7; transition: 0.2s; }
    .delete-btn:hover { opacity: 1; }
    
    .send-btn { background: #00b4d8; color: white; }
    .wipe-btn { background: #d90429; color: white; }
    h4 { margin: 15px 0 5px 0; color: #00b4d8; border-bottom: 1px solid #415a77; padding-bottom: 3px;}
  </style>
</head>
<body>
  <div class="side">
    <h3 id="nameTag">🚀 User</h3>
    <button class="friend-btn" onclick="sendFriendRequest()">+ Add Friend</button>
    
    <h4>Pending Requests 📩</h4>
    <div id="requestsBox"></div>

    <h4>My Friends 🚀</h4>
    <div id="friendsBox"></div>
  </div>
  <div class="main">
    <div id="target" style="padding:15px; background:#1b263b; font-size:18px; font-weight:bold;">No active chat</div>
    <div class="box" id="window"></div>
    <div class="input-bar">
      <input type="text" id="msg" placeholder="Type a message safely...">
      <button class="send-btn" onclick="send()">Send</button>
      <button class="wipe-btn" onclick="wipe()">Wipe</button>
    </div>
  </div>

  <script>
    const socket = io();
    const me = localStorage.getItem('username');
    let peer = '';
    
    document.getElementById('nameTag').innerText = `🚀 ${me}`;
    socket.emit('join', me);

    loadDashboardData();

    async function loadDashboardData() {
      const res = await fetch(`/api/friends-data/${me}`);
      const data = await res.json();
      
      const friendsContainer = document.getElementById('friendsBox');
      friendsContainer.innerHTML = ''; 
      data.friends.forEach(name => appendFriendDOM(name));

      const requestsContainer = document.getElementById('requestsBox');
      requestsContainer.innerHTML = ''; 
      data.requests.forEach(name => appendRequestDOM(name));
    }

    async function sendFriendRequest() {
      const name = prompt("Enter username to send request to:");
      if(!name) return;

      const res = await fetch('/api/friends/request', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ myUsername: me, friendUsername: name })
      });

      const data = await res.json();
      if(res.ok) {
        alert(`Friend request blasted to ${name}!`);
      } else {
        alert(data.error || "Failed to send request.");
      }
    }

    async function acceptRequest(senderName) {
      const res = await fetch('/api/friends/accept', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ myUsername: me, requesterUsername: senderName })
      });
      if(res.ok) {
        loadDashboardData();
        alert(`You are now friends with ${senderName}!`);
      }
    }

    // 🚀 NEW: DECLINE INCOMING FRIEND REQUEST ENGINE
    async function declineRequest(senderName) {
      const res = await fetch('/api/friends/decline', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ myUsername: me, requesterUsername: senderName })
      });
      if(res.ok) {
        loadDashboardData();
        alert(`Friend request from ${senderName} removed.`);
      }
    }

    // 🚀 NEW: MUTUAL FRIEND DELETE SYSTEM
    async function deleteFriend(event, friendName) {
      event.stopPropagation(); // Prevents clicking the delete button from opening the chat window
      const confirmDelete = confirm(`Are you sure you want to completely remove ${friendName} from your friends?`);
      if (!confirmDelete) return;

      const res = await fetch('/api/friends/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ myUsername: me, friendUsername: friendName })
      });

      if(res.ok) {
        // If we are currently chatting with the person we deleted, close the chat window
        if (peer === friendName) {
          peer = '';
          document.getElementById('target').innerText = 'No active chat';
          document.getElementById('window').innerHTML = '';
        }
        loadDashboardData();
        alert(`${friendName} has been removed from your connections.`);
      }
    }

    function appendFriendDOM(name) {
      const d = document.createElement('div');
      d.className = 'friend-item';
      d.onclick = () => { selectFriend(name); };
      
      // Inject friend name text and a floating red delete button
      d.innerHTML = `<span>${name}</span> <button class="delete-btn" onclick="deleteFriend(event, '${name}')">Remove</button>`;
      document.getElementById('friendsBox').appendChild(d);
    }

    function appendRequestDOM(name) {
      const d = document.createElement('div');
      d.className = 'req-item';
      d.innerHTML = `
        <span>${name}</span> 
        <div>
          <button class="accept-btn" onclick="acceptRequest('${name}')">Accept</button>
          <button class="decline-btn" onclick="declineRequest('${name}')">Decline</button>
        </div>
      `;
      document.getElementById('requestsBox').appendChild(d);
    }

    async function selectFriend(name) {
      peer = name;
      document.getElementById('target').innerText = `Room with: ${name}`;
      document.getElementById('window').innerHTML = '';

      const res = await fetch(`/api/messages/${me}/${name}`);
      const messages = await res.json();
      
      messages.forEach(msg => {
        const side = msg.sender === me ? 'right' : 'left';
        show(msg.message, side);
      });
    }

    function send() {
      const txt = document.getElementById('msg').value;
      if(!txt || !peer) return;
      show(txt, 'right');
      socket.emit('private_message', { sender: me, receiver: peer, message: txt });
      document.getElementById('msg').value = '';
    }

    socket.on('new_message', data => { 
      if(data.sender === peer) show(data.message, 'left'); 
    });

    socket.on('incoming_request', () => { loadDashboardData(); });
    socket.on('request_accepted', () => { loadDashboardData(); });
    
    // 🚀 NEW: Listens for real-time removal flags from ex-friends
    socket.on('friend_deleted', (data) => {
      if (data.by === peer) {
        peer = '';
        document.getElementById('target').innerText = 'No active chat';
        document.getElementById('window').innerHTML = '';
      }
      loadDashboardData();
    });

    socket.on('chat_wiped', (data) => {
      if (data.wipedBy === peer) {
        document.getElementById('window').innerHTML = '';
        alert(`🔒 Privacy Notice: ${data.wipedBy} has permanently wiped this conversation.`);
      }
    });

    async function wipe() {
      if(!peer) return;
      const confirmWipe = confirm("Are you sure you want to permanently wipe this conversation for BOTH of you?");
      if (!confirmWipe) return;

      await fetch('/api/messages/delete', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ sender: me, receiver: peer })
      });

      document.getElementById('window').innerHTML = '';
      socket.emit('trigger_wipe', { sender: me, receiver: peer });
      alert('Conversation wiped clean everywhere!');
    }

    function show(t, side) {
      const el = document.createElement('div');
      el.innerText = t;
      el.style.textAlign = side === 'right' ? 'right' : 'left';
      el.style.margin = "10px 0";
      el.style.background = side === 'right' ? '#0077b6' : '#222';
      el.style.padding = "10px";
      el.style.borderRadius = "8px";
      el.style.maxWidth = "60%";
      el.style.marginLeft = side === 'right' ? 'auto' : '0';
      document.getElementById('window').appendChild(el);
      const win = document.getElementById('window');
      win.scrollTop = win.scrollHeight;
    }
  </script>
</body>
</html>
